{{define "base"}}<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>{{.Title}} — Schyotovod</title>
  <style>
    :root {
      --bg: #f4f6f8; --card: #fff; --border: #dde3e8; --text: #1f2933;
      --muted: #6b7783; --primary: #2563eb; --primary-h: #1d4ed8;
      --ok: #16a34a; --err: #dc2626; --warn: #d97706; --hint: #eef2f7;
    }
    * { box-sizing: border-box; }
    body { margin: 0; font-family: -apple-system, Segoe UI, Roboto, Arial, sans-serif;
      background: var(--bg); color: var(--text); font-size: 15px; line-height: 1.5; }
    header { background: var(--card); border-bottom: 1px solid var(--border);
      padding: 12px 24px; display: flex; align-items: center; justify-content: space-between; }
    header .brand { font-weight: 700; font-size: 18px; color: var(--primary); }
    header nav a { margin-left: 18px; color: var(--muted); text-decoration: none; }
    header nav a.active, header nav a:hover { color: var(--primary); }
    .container { max-width: 900px; margin: 24px auto; padding: 0 16px; }
    .container.wide { max-width: 1320px; }
    .card { background: var(--card); border: 1px solid var(--border);
      border-radius: 10px; padding: 24px; margin-bottom: 20px; }
    h1 { font-size: 22px; margin: 0 0 16px; }
    h2 { font-size: 17px; margin: 24px 0 12px; padding-bottom: 6px; border-bottom: 1px solid var(--border); }
    label { display: block; font-weight: 600; margin: 14px 0 4px; }
    .hint { color: var(--muted); font-size: 13px; margin: 2px 0 6px; }
    input[type=text], input[type=password], input[type=number], input[type=time], select {
      width: 100%; padding: 9px 11px; border: 1px solid var(--border);
      border-radius: 7px; font-size: 14px; background: #fff; }
    input:focus, select:focus { outline: none; border-color: var(--primary); }
    .field.error input { border-color: var(--err); }
    .field-error { color: var(--err); font-size: 13px; margin-top: 4px; }
    .row { display: flex; gap: 16px; flex-wrap: wrap; }
    .row > .field { flex: 1; min-width: 180px; }
    .btn { display: inline-block; background: var(--primary); color: #fff; border: none;
      padding: 10px 18px; border-radius: 7px; font-size: 14px; font-weight: 600;
      cursor: pointer; text-decoration: none; }
    .btn:hover { background: var(--primary-h); }
    .btn.secondary { background: #fff; color: var(--primary); border: 1px solid var(--primary); }
    .btn.secondary:hover { background: var(--hint); }
    .btn:disabled { opacity: 0.6; cursor: not-allowed; pointer-events: none; }
    .actions { margin-top: 20px; display: flex; gap: 12px; align-items: center; flex-wrap: wrap; }
    .alert { padding: 12px 14px; border-radius: 8px; margin-bottom: 16px; font-size: 14px; }
    .alert.ok { background: #ecfdf5; color: var(--ok); border: 1px solid #a7f3d0; }
    .alert.err { background: #fef2f2; color: var(--err); border: 1px solid #fecaca; }
    .alert.warn { background: #fffbeb; color: var(--warn); border: 1px solid #fde68a; }
    .checkbox { display: flex; align-items: center; gap: 8px; margin: 14px 0; }
    .checkbox input { width: auto; }
    .checkbox label { margin: 0; }
    pre.log { background: #0f172a; color: #cbd5e1; padding: 16px; border-radius: 8px;
      overflow: auto; max-height: 500px; font-size: 12.5px; line-height: 1.55; white-space: pre-wrap; }
    .muted { color: var(--muted); }
    .login-wrap { max-width: 380px; margin: 80px auto; }
    details { margin-top: 10px; }
    details summary { cursor: pointer; color: var(--primary); font-size: 13px; }
    .badge { display: inline-block; padding: 2px 8px; border-radius: 20px; font-size: 12px; font-weight: 600; }
    .badge.ok { background: #ecfdf5; color: var(--ok); }
    .badge.new { background: #eff6ff; color: var(--primary); }
    .badge.err { background: #fef2f2; color: var(--err); }
    .badge.pending { background: #fffbeb; color: var(--warn); }
    .badge.skip { background: #f3f4f6; color: var(--muted); }
    .jtablewrap { overflow-x: auto; max-width: 100%; }
    table.journal { width: 100%; border-collapse: collapse; font-size: 13px; }
    table.journal th, table.journal td { padding: 7px 8px; border-bottom: 1px solid var(--border); text-align: left; vertical-align: top; white-space: nowrap; }
    table.journal td.jclient { white-space: normal; max-width: 180px; word-break: break-word; }
    table.journal tr.jdetail > td { white-space: normal; }
    table.journal th a { color: var(--muted); text-decoration: none; }
    table.journal th a:hover { color: var(--primary); }
    table.journal tr.jrow { cursor: pointer; }
    table.journal tr.jrow:hover { background: var(--hint); }
    table.journal tr.jdetail > td { background: #f9fafb; }
    .jtimeline { display: flex; flex-wrap: wrap; gap: 6px; margin-bottom: 10px; }
    .jstage { padding: 2px 8px; border-radius: 6px; font-size: 12px; background: #eef2f7; color: var(--muted); }
    .jstage.ok { background: #ecfdf5; color: var(--ok); }
    .jstage.err { background: #fef2f2; color: var(--err); }
    .jstep { border: 1px solid var(--border); border-radius: 6px; padding: 8px; margin-bottom: 8px; font-size: 12px; }
    .jstep .ep { font-weight: 600; }
    .jstep { max-width: 100%; overflow: hidden; }
    .jstep pre { background: #0f172a; color: #cbd5e1; padding: 8px; border-radius: 6px; overflow: auto; max-height: 220px; white-space: pre-wrap; word-break: break-all; overflow-wrap: anywhere; margin: 4px 0 0; }
    table.journal tr.jdetail > td { max-width: 0; }
    .jfilters { display: flex; gap: 10px; flex-wrap: wrap; align-items: end; margin-bottom: 12px; }
    .jfilters .field { min-width: 150px; }
  </style>
</head>
<body>
  {{if .ShowNav}}
  <header>
    <span class="brand">Schyotovod</span>
    <nav>
      <a href="/settings" class="{{if eq .Active "settings"}}active{{end}}">Настройки</a>
      <a href="/logs" class="{{if eq .Active "logs"}}active{{end}}">Логи</a>
      <a href="/updates" class="{{if eq .Active "updates"}}active{{end}}">Обновления</a>
      <a href="/logout">Выход</a>
    </nav>
  </header>
  {{end}}
  <div class="{{if .ShowNav}}container{{if .Wide}} wide{{end}}{{else}}login-wrap{{end}}">
    {{template "content" .}}
  </div>
</body>
</html>
{{end}}
